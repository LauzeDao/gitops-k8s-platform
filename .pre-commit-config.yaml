minimum_pre_commit_version: "3.5.0"

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/k8s-at-home/sops-pre-commit
    rev: v2.1.1
    hooks:
      - id: forbid-secrets

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.2
    hooks:
      - id: terraform_fmt

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args:
          - "-d"
          - "{extends: relaxed, rules: {line-length: disable, comments: {min-spaces-from-content: 1}}}"

  - repo: local
    hooks:
      - id: kubeconform
        name: kustomize build + kubeconform (clusters)
        entry: bash -c 'set -e; for c in clusters/local clusters/azure; do echo "validating $c"; kustomize build "$c" | kubeconform -strict -ignore-missing-schemas -summary; done'
        language: system
        pass_filenames: false
        files: ^(clusters|apps|infrastructure)/.*\.ya?ml$
