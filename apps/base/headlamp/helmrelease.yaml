---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: headlamp
  namespace: tools
  labels:
    app.kubernetes.io/part-of: gitops-k8s-platform
    app.kubernetes.io/name: headlamp
spec:
  interval: 1h
  url: https://kubernetes-sigs.github.io/headlamp/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: tools
  labels:
    app.kubernetes.io/part-of: gitops-k8s-platform
    app.kubernetes.io/name: headlamp
spec:
  interval: 5m
  chart:
    spec:
      chart: headlamp
      version: 0.43.0
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: tools
  valuesFrom:
    - kind: ConfigMap
      name: headlamp-values
      valuesKey: values.yaml
