---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: grafana-community
  namespace: tools
  labels:
    app.kubernetes.io/part-of: gitops-k8s-platform
    app.kubernetes.io/name: loki
spec:
  interval: 1h
  url: https://grafana.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: tools
  labels:
    app.kubernetes.io/part-of: gitops-k8s-platform
    app.kubernetes.io/name: loki
spec:
  interval: 5m
  chart:
    spec:
      chart: loki
      # renovate: helm chart "loki" from repo https://grafana.github.io/helm-charts
      version: 6.55.0
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: tools
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  valuesFrom:
    - kind: ConfigMap
      name: loki-values
      valuesKey: values.yaml
