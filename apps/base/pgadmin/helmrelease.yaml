---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: runix
  namespace: tools
  labels:
    app.kubernetes.io/part-of: gitops-k8s-platform
    app.kubernetes.io/name: pgadmin
spec:
  interval: 1h
  url: https://helm.runix.net
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pgadmin
  namespace: tools
  labels:
    app.kubernetes.io/part-of: gitops-k8s-platform
    app.kubernetes.io/name: pgadmin
spec:
  interval: 5m
  chart:
    spec:
      chart: pgadmin4
      version: 1.65.0
      sourceRef:
        kind: HelmRepository
        name: runix
        namespace: tools
  valuesFrom:
    - kind: ConfigMap
      name: pgadmin-values
      valuesKey: values.yaml
