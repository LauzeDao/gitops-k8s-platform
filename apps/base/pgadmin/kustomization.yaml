apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tools

resources:
  - helmrelease.yaml
  - ingress.yaml
  - secret.sops.yaml

configMapGenerator:
  - name: pgadmin-values
    files:
      - values.yaml
  - name: pgadmin-config
    files:
      - config_local.py

generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/part-of: gitops-k8s-platform
    app.kubernetes.io/name: pgadmin
