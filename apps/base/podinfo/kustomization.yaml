apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tools

resources:
  - helmrelease.yaml
  - ingress.yaml
  - imagepolicy.yaml
  - imageupdateautomation.yaml
  - canary.yaml

configMapGenerator:
  - name: podinfo-values
    files:
      - values.yaml

generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/part-of: gitops-k8s-platform
    app.kubernetes.io/name: podinfo
