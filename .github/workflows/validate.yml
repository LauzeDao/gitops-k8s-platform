name: validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  TOFU_VERSION: "1.8.5"
  TFLINT_VERSION: "v0.53.0"
  KUSTOMIZE_VERSION: "5.4.3"
  KUBECONFORM_VERSION: "0.6.7"

jobs:
  tofu:
    name: OpenTofu fmt + tflint (bootstrap/azure)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1.0.5
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: tofu fmt -check
        run: tofu fmt -check -recursive bootstrap/azure

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4.1.1
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: tflint
        working-directory: bootstrap/azure
        run: |
          tflint --init
          tflint --recursive

  kustomize:
    name: kustomize build + kubeconform
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cluster: [local, azure]
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install kustomize
        run: |
          curl -sSfL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kustomize
          kustomize version

      - name: Install kubeconform
        run: |
          curl -sSfL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kubeconform
          kubeconform -v

      - name: Build & validate clusters/${{ matrix.cluster }}
        run: |
          kustomize build "clusters/${{ matrix.cluster }}" \
            | kubeconform -strict -ignore-missing-schemas -summary
