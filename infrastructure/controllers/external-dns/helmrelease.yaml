apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: gitops-k8s-platform
spec:
  interval: 30m
  releaseName: external-dns
  targetNamespace: external-dns
  storageNamespace: external-dns
  chart:
    spec:
      chart: external-dns
      # renovate: helm chart "external-dns" from repo https://kubernetes-sigs.github.io/external-dns/
      version: "1.21.1"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: external-dns-values
      valuesKey: values.yaml
