controller:
  replicaCount: 1
  ingressClassResource:
    name: nginx
    enabled: true
    default: true
  ingressClass: nginx
  hostPort:
    enabled: true
    ports:
      http: 80
      https: 443
  service:
    type: ClusterIP
  nodeSelector:
    ingress-ready: "true"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Equal
      effect: NoSchedule
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  admissionWebhooks:
    enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
defaultBackend:
  enabled: false
