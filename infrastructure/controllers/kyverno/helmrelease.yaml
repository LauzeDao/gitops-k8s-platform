apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: gitops-k8s-platform
spec:
  interval: 30m
  releaseName: kyverno
  targetNamespace: kyverno
  storageNamespace: kyverno
  chart:
    spec:
      chart: kyverno
      # renovate: helm chart "kyverno" from repo https://kyverno.github.io/kyverno/
      version: "3.8.1"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: kyverno-values
      valuesKey: values.yaml
