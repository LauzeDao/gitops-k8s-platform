apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - helmrelease.yaml
generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/part-of: gitops-k8s-platform
configMapGenerator:
  - name: flagger-values
    namespace: flagger-system
    files:
      - values.yaml
