apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: pod-security-baseline
  labels:
    app.kubernetes.io/part-of: gitops-k8s-platform
  annotations:
    policies.kyverno.io/title: Pod Security Baseline
    policies.kyverno.io/category: Pod Security Standards (Baseline)
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Validates Pods against the Pod Security Standards "baseline" profile.
      Documented exceptions (e.g. ingress-nginx) can be added via policy exclusions.
spec:
  background: true
  rules:
    - name: baseline
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        failureAction: Audit
        podSecurity:
          level: baseline
          version: latest
