apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: gitops-k8s-platform
data:
  config.alloy: |-
    // Discover every pod in the cluster.
    discovery.kubernetes "pods" {
      role = "pod"
    }

    // Derive Loki labels and the on-disk log path per container.
    discovery.relabel "pod_logs" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        target_label  = "node"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
        target_label  = "app"
      }
      rule {
        source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
        separator     = "/"
        target_label  = "job"
      }
      // Path: /var/log/pods/<ns>_<pod>_<uid>/<container>/*.log -> glob on uid/container.
      rule {
        source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
        separator     = "/"
        action        = "replace"
        replacement   = "/var/log/pods/*$1/*.log"
        target_label  = "__path__"
      }
    }

    // Match only the log files that physically exist on THIS node
    // (DaemonSet -> kubelet writes only node-local pod logs => node-local implicitly).
    local.file_match "pod_logs" {
      path_targets = discovery.relabel.pod_logs.output
    }

    // Tail the files and forward to CRI processing.
    loki.source.file "pod_logs" {
      targets    = local.file_match.pod_logs.targets
      forward_to = [loki.process.pod_logs.receiver]
    }

    // Parse the CRI format (strips the "<ts> stdout F" prefix, extracts message + timestamp).
    loki.process "pod_logs" {
      stage.cri {}
      forward_to = [loki.write.default.receiver]
    }

    // Loki backend lives in the `tools` namespace (cross-namespace -> FQDN).
    loki.write "default" {
      endpoint {
        url = "http://loki.tools.svc.cluster.local:3100/loki/api/v1/push"
      }
    }
