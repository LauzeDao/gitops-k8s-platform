apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: platform-overview-dashboard
    namespace: monitoring
    options:
      labels:
        grafana_dashboard: "1"
        app.kubernetes.io/part-of: gitops-k8s-platform
    files:
      - platform-overview.json

generatorOptions:
  disableNameSuffixHash: true
