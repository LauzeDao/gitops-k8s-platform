apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
  labels:
    grafana_datasource: "1"
    app.kubernetes.io/part-of: gitops-k8s-platform
data:
  datasources.yaml: |-
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        jsonData:
          timeInterval: "30s"
          httpMethod: POST
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki.tools.svc.cluster.local:3100
        jsonData:
          maxLines: 1000
